# Migration Slices
# Status lifecycle: proposed → in_progress → done

slices:
  - id: slice-001
    name: "Replace timing-based test with deterministic fake clock"
    status: proposed
    dependencies: []
    touched_paths:
      - tests/integration/test_retry_worker.py
    contracts:
      added:
        - "FakeClock stub class (inline in test file)"
        - "test_retry_worker_completes_all_attempts (deterministic replacement)"
        - "test_retry_worker_sleeps_between_attempts (asserts sleep calls, not wall time)"
      changed:
        - tests/integration/test_retry_worker.py
      removed:
        - "test_retry_worker_waits_between_attempts (timing-based test)"
        - "test_inline_scenario_shape (tested deleted helper)"
        - "import of time.time for wall-clock measurement"
        - "import of scenario_factory"
    denylist_patterns:
      - "time\\.time\\(\\)"
      - "elapsed\\s*>="
      - "make_retry_scenario"
      - "from tests\\.helpers\\.scenario_factory"
    deletion_targets:
      - "test_retry_worker_waits_between_attempts function"
      - "test_inline_scenario_shape function"
    replay_scenarios:
      - "pytest tests/integration/test_retry_worker.py -v"
    smoke_scenarios: []
    risks:
      - "Ensure FakeClock.sleep signature matches time.sleep (single float arg)"
    notes: "RetryWorker already accepts clock injection — no production code changes needed."

  - id: slice-002
    name: "Remove dead helpers, scripts, and stale docs"
    status: proposed
    dependencies: [slice-001]
    touched_paths:
      - tests/helpers/scenario_factory.py
      - scripts/run-flaky-tests.sh
      - docs/testing.md
    contracts:
      added: []
      changed:
        - docs/testing.md
      removed:
        - tests/helpers/scenario_factory.py
        - scripts/run-flaky-tests.sh
    denylist_patterns:
      - "scenario_factory"
      - "run-flaky-tests"
      - "rerun.*until.*pass"
    deletion_targets:
      - tests/helpers/scenario_factory.py
      - scripts/run-flaky-tests.sh
    replay_scenarios:
      - "pytest tests/ -v"
    smoke_scenarios: []
    risks:
      - "Verify no other test files import from scenario_factory before deleting"
    notes: "docs/testing.md rewritten to describe fake clock approach."

  - id: slice-003
    name: "Add guard script with ratchets at zero"
    status: proposed
    dependencies: [slice-001, slice-002]
    touched_paths:
      - guard.sh
    contracts:
      added:
        - guard.sh
      changed: []
      removed: []
    denylist_patterns: []
    deletion_targets: []
    replay_scenarios:
      - "./guard.sh"
      - "./guard.sh --status"
    smoke_scenarios: []
    risks: []
    notes: "Permanent regression guard. All ratchet budgets set to 0 since this is the final slice."
