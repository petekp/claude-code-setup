# Anti-pattern ratchets
# Budgets can only decrease.

ratchets:
  - id: ratchet-001
    label: "Wall-clock time.time() in tests"
    pattern: "time\\.time\\(\\)"
    scope: "tests/"
    budget: 2
    rationale: "Wall-clock assertions make tests timing-dependent and flaky in CI"
    notes: "2 occurrences in tests/integration/test_retry_worker.py lines 11, 13"

  - id: ratchet-002
    label: "Real time.sleep() in tests"
    pattern: "time\\.sleep\\("
    scope: "tests/"
    budget: 0
    rationale: "Tests should not call real sleep — use fake clock injection instead"
    notes: "Currently 0 in tests (sleep is in src/retry_worker.py via clock.sleep, but the test passes real time as clock). After migration, FakeClock replaces real time object."

  - id: ratchet-003
    label: "Elapsed timing threshold assertions"
    pattern: "elapsed\\s*>="
    scope: "tests/"
    budget: 1
    rationale: "Timing threshold assertions are non-deterministic — replace with call-count checks"
    notes: "1 occurrence in tests/integration/test_retry_worker.py line 16"

  - id: ratchet-004
    label: "make_retry_scenario references"
    pattern: "make_retry_scenario"
    scope: "tests/"
    budget: 2
    rationale: "Helper becomes dead code after test rewrite — must be fully removed"
    notes: "1 import + 1 call in test_retry_worker.py; 1 definition in scenario_factory.py (3 total in tests/, but definition is in the file being deleted)"

  - id: ratchet-005
    label: "scenario_factory references"
    pattern: "scenario_factory"
    scope: "."
    budget: 2
    rationale: "Module being deleted — no references should remain"
    notes: "1 import in test_retry_worker.py, 1 file tests/helpers/scenario_factory.py"

  - id: ratchet-006
    label: "run-flaky-tests references"
    pattern: "run-flaky-tests"
    scope: "."
    budget: 2
    rationale: "Retry script being deleted — no references should remain"
    notes: "1 in scripts/run-flaky-tests.sh (filename), 1 in docs/testing.md"

  - id: ratchet-007
    label: "Flaky-test advice in docs"
    pattern: "flaky"
    scope: "docs/"
    budget: 1
    rationale: "Docs should not advise retrying flaky tests once tests are deterministic"
    notes: "1 occurrence in docs/testing.md line 4"
