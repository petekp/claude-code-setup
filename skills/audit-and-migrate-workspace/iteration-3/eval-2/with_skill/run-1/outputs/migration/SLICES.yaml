# Migration Slices
# Status lifecycle: proposed → in_progress → done
# Reserve a final convergence slice for residue sweep + ship verification.

slices:
  - id: slice-001
    type: implementation
    name: "Replace timing-based test with deterministic fake-clock test"
    status: proposed
    dependencies: []
    touched_paths:
      - tests/integration/test_retry_worker.py
      - tests/helpers/scenario_factory.py
      - tests/helpers/
    external_surfaces: []
    contracts:
      added:
        - "FakeClock class (inline in test_retry_worker.py)"
      changed:
        - "test_retry_worker_waits_between_attempts — rewritten to use FakeClock"
      removed:
        - "test_inline_scenario_shape — dead shape-test of removed helper"
        - "tests/helpers/scenario_factory.py — Scenario class and make_retry_scenario"
        - "tests/helpers/ — empty directory"
    denylist_patterns:
      - "make_retry_scenario"
      - "scenario_factory"
      - "test_inline_scenario_shape"
    deletion_targets:
      - tests/helpers/scenario_factory.py
      - tests/helpers/
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries:
      - pattern: "make_retry_scenario"
        scope: "tests/"
        reason: "Factory helper must be fully removed, not just unused"
      - pattern: "scenario_factory"
        scope: "tests/"
        reason: "No imports or references to deleted module should remain"
      - pattern: "time\\.time\\(\\)"
        scope: "tests/"
        reason: "Wall-clock assertions replaced by fake-clock call recording"
      - pattern: "elapsed\\s*>="
        scope: "tests/"
        reason: "Timing threshold assertions replaced by deterministic checks"
    verification_commands:
      - command: "pytest tests/integration/test_retry_worker.py -q"
        expect: "all tests pass"
      - command: "rg 'time\\.time\\(\\)' tests/"
        expect: "zero matches"
      - command: "rg 'make_retry_scenario' tests/"
        expect: "zero matches"
    replay_scenarios: []
    smoke_scenarios: []
    manual_checks: []
    risks:
      - "FakeClock must implement sleep() with compatible signature"
    notes: "RetryWorker already accepts clock injection — no production code changes needed"

  - id: slice-002
    type: implementation
    name: "Delete flaky-test retry script and update docs"
    status: proposed
    dependencies:
      - slice-001
    touched_paths:
      - scripts/run-flaky-tests.sh
      - scripts/
      - docs/testing.md
    external_surfaces: []
    contracts:
      added: []
      changed:
        - "docs/testing.md — rewritten to describe deterministic testing approach"
      removed:
        - "scripts/run-flaky-tests.sh — retry-until-green script"
        - "scripts/ — empty directory"
    denylist_patterns:
      - "run-flaky-tests"
    deletion_targets:
      - scripts/run-flaky-tests.sh
      - scripts/
    temp_artifacts: []
    docs_to_update:
      - docs/testing.md
    dependency_changes: []
    residue_queries:
      - pattern: "run-flaky-tests"
        scope: "."
        reason: "No references to deleted retry script should remain anywhere"
      - pattern: "rerun.*until.*pass"
        scope: "docs/"
        reason: "Retry-until-green advice must be removed from docs"
      - pattern: "flaky"
        scope: "docs/"
        reason: "Docs should not reference flakiness since tests are now deterministic"
    verification_commands:
      - command: "rg 'run-flaky-tests' ."
        expect: "zero matches"
      - command: "rg 'flaky' docs/"
        expect: "zero matches"
      - command: "test ! -f scripts/run-flaky-tests.sh && echo 'deleted'"
        expect: "deleted"
    replay_scenarios: []
    smoke_scenarios: []
    manual_checks: []
    risks: []
    notes: "Script and docs are pure cleanup — no behavioral risk"

  - id: slice-003
    type: convergence
    name: "Final residue sweep and ship verification"
    status: proposed
    dependencies:
      - slice-001
      - slice-002
    touched_paths: []
    external_surfaces:
      - "pyproject.toml pythonpath config"
    contracts:
      added: []
      changed: []
      removed: []
    denylist_patterns: []
    deletion_targets: []
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries:
      - pattern: "time\\.sleep\\("
        scope: "tests/"
        reason: "No real sleep calls should remain in tests"
      - pattern: "time\\.time\\(\\)"
        scope: "tests/"
        reason: "No wall-clock measurement should remain in tests"
      - pattern: "scenario_factory"
        scope: "."
        reason: "Deleted module must not be referenced anywhere in repo"
      - pattern: "make_retry_scenario"
        scope: "."
        reason: "Deleted helper must not be referenced anywhere in repo"
      - pattern: "run-flaky-tests"
        scope: "."
        reason: "Deleted script must not be referenced anywhere in repo"
      - pattern: "TODO\\(migration\\)"
        scope: "."
        reason: "No migration markers should remain"
    verification_commands:
      - command: "./guard.sh"
        expect: "all ratchets pass at budget 0"
      - command: "pytest tests/ -q"
        expect: "all tests pass"
    replay_scenarios: []
    smoke_scenarios: []
    manual_checks: []
    risks: []
    notes: "Execute SHIP_CHECKLIST.md and write final handoff"
