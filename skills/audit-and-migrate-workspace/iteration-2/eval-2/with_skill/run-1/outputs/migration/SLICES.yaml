# Migration Slices
# Status lifecycle: proposed → in_progress → done
# Reserve a final convergence slice for residue sweep + ship verification.

slices:
  - id: slice-001
    type: implementation
    name: "Replace timing-based test with FakeClock deterministic test"
    status: proposed
    dependencies: []
    touched_paths:
      - tests/helpers/fake_clock.py
      - tests/integration/test_retry_worker.py
    contracts:
      added:
        - tests/helpers/fake_clock.py
      changed:
        - tests/integration/test_retry_worker.py
      removed: []
    denylist_patterns:
      - 'time\.time\(\)'
      - 'elapsed >='
    deletion_targets: []
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries:
      - pattern: 'time\.time\(\)'
        scope: tests/
        description: "Wall-clock timing measurement in tests"
      - pattern: 'elapsed\s*>='
        scope: tests/
        description: "Elapsed time assertions in tests"
      - pattern: 'clock=time\b'
        scope: tests/
        description: "Real clock injection in tests"
    verification_commands:
      - "pytest tests/ -q"
      - "rg 'time\\.time\\(\\)' tests/ --count-matches || echo 'zero matches (good)'"
      - "rg 'elapsed' tests/ --count-matches || echo 'zero matches (good)'"
    replay_scenarios: []
    smoke_scenarios:
      - "pytest tests/integration/test_retry_worker.py -q"
    manual_checks: []
    risks:
      - "FakeClock must implement the same interface as the time module (at minimum: sleep method)"
    notes: "RetryWorker already accepts clock parameter — this is a test-only change. Production code unchanged."

  - id: slice-002
    type: implementation
    name: "Delete flaky-test retry script and update testing docs"
    status: proposed
    dependencies:
      - slice-001
    touched_paths:
      - scripts/run-flaky-tests.sh
      - docs/testing.md
    contracts:
      added: []
      changed:
        - docs/testing.md
      removed:
        - scripts/run-flaky-tests.sh
    denylist_patterns:
      - 'run-flaky-tests'
      - 'rerun.*until.*pass'
    deletion_targets:
      - scripts/run-flaky-tests.sh
    temp_artifacts: []
    docs_to_update:
      - docs/testing.md
    dependency_changes: []
    residue_queries:
      - pattern: 'run-flaky-tests'
        scope: '.'
        description: "References to deleted retry script"
      - pattern: 'flaky'
        scope: docs/
        description: "Flaky test language in documentation"
      - pattern: 'rerun|retry|until.*pass'
        scope: docs/
        description: "Retry workaround language in docs"
    verification_commands:
      - "test ! -f scripts/run-flaky-tests.sh && echo 'script deleted'"
      - "rg 'run-flaky-tests' . --count-matches || echo 'zero matches (good)'"
      - "rg 'flaky' docs/ --count-matches || echo 'zero matches (good)'"
    replay_scenarios: []
    smoke_scenarios: []
    manual_checks: []
    risks:
      - "Other docs or scripts may reference run-flaky-tests.sh — residue query covers this"
    notes: "Pure cleanup slice. No production code changes."

  - id: slice-003
    type: convergence
    name: "Final residue sweep, guard verification, and ship gate"
    status: proposed
    dependencies:
      - slice-001
      - slice-002
    touched_paths:
      - guard.sh
      - migration/MAP.csv
      - migration/SHIP_CHECKLIST.md
    contracts:
      added:
        - guard.sh
      changed: []
      removed: []
    denylist_patterns: []
    deletion_targets: []
    temp_artifacts: []
    docs_to_update:
      - migration/SHIP_CHECKLIST.md
    dependency_changes: []
    residue_queries:
      - pattern: 'TODO\(migration\)'
        scope: '.'
        description: "Migration TODO markers"
      - pattern: '(old|backup|temp)\.'
        scope: '.'
        description: "Scratch or backup files"
    verification_commands:
      - "./guard.sh"
      - "pytest tests/ -q"
      - "./guard.sh --status"
    replay_scenarios: []
    smoke_scenarios:
      - "pytest tests/ -v"
    manual_checks:
      - "Review final diff to confirm no commented-out code, stray logs, or old/new/final artifacts"
    risks: []
    notes: "Convergence slice — owns the final ship gate. Execute SHIP_CHECKLIST.md line by line."
