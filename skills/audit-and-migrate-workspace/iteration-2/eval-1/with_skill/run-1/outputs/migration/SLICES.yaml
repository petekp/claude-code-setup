# Migration Slices
# Status lifecycle: proposed → in_progress → done

slices:
  - id: slice-001
    type: implementation
    name: page view migration
    status: done
    dependencies: []
    touched_paths:
      - packages/web/src/lib/analytics-client.ts
    contracts:
      added: []
      changed:
        - packages/web/src/lib/analytics-client.ts
      removed: []
    denylist_patterns: []
    deletion_targets: []
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries: []
    verification_commands: []
    replay_scenarios:
      - web home page load
    smoke_scenarios: []
    manual_checks: []
    risks: []
    notes: >
      Page views moved to analytics-client.ts. NOTE: trackLegacyPageView was
      not deleted in this slice (methodology violation). Deletion absorbed by
      slice-002 per Decision 2.

  - id: slice-002
    type: implementation
    name: signup tracking migration + legacy file deletion
    status: in_progress
    dependencies:
      - slice-001
    touched_paths:
      - packages/web/src/lib/legacy-analytics.ts
      - packages/web/src/lib/analytics-client.ts
    contracts:
      added:
        - "trackSignup() in analytics-client.ts"
      changed:
        - packages/web/src/lib/analytics-client.ts
      removed:
        - packages/web/src/lib/legacy-analytics.ts
    denylist_patterns:
      - "trackLegacySignup"
      - "trackLegacyPageView"
      - "legacy-analytics"
    deletion_targets:
      - packages/web/src/lib/legacy-analytics.ts
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries:
      - "trackLegacy"
      - "import.*legacy-analytics"
    verification_commands:
      - "rg 'trackLegacy' packages/ && exit 1 || exit 0"
      - "test ! -f packages/web/src/lib/legacy-analytics.ts"
      - "rg 'trackSignup' packages/web/src/lib/analytics-client.ts"
    replay_scenarios: []
    smoke_scenarios:
      - signup flow emits new analytics event
    manual_checks:
      - verify signup event appears in analytics dashboard
    risks:
      - dashboard parity not verified — downstream dashboards may reference legacy event names
    notes: >
      Resumed from prior session. Must add trackSignup to analytics-client.ts,
      migrate all call sites, then delete legacy-analytics.ts entirely
      (covers both trackLegacySignup and residual trackLegacyPageView per Decision 2).

  - id: slice-003
    type: implementation
    name: env bridge removal and docs cleanup
    status: proposed
    dependencies:
      - slice-002
    touched_paths:
      - packages/shared/src/env.ts
      - docs/analytics-migration.md
    contracts:
      added: []
      changed:
        - packages/shared/src/env.ts
      removed:
        - "LEGACY_ANALYTICS_WRITE_KEY from env.ts"
        - "ENABLE_LEGACY_ANALYTICS_BRIDGE from env.ts"
    denylist_patterns:
      - "LEGACY_ANALYTICS_WRITE_KEY"
      - "ENABLE_LEGACY_ANALYTICS_BRIDGE"
      - "legacy.*bridge"
    deletion_targets: []
    temp_artifacts: []
    docs_to_update:
      - docs/analytics-migration.md
    dependency_changes: []
    residue_queries:
      - "LEGACY_ANALYTICS"
      - "ENABLE_LEGACY_ANALYTICS_BRIDGE"
      - "legacy.*write.*key"
    verification_commands:
      - "rg 'LEGACY_ANALYTICS' packages/ docs/ && exit 1 || exit 0"
      - "rg 'ENABLE_LEGACY_ANALYTICS_BRIDGE' packages/ docs/ && exit 1 || exit 0"
    replay_scenarios: []
    smoke_scenarios: []
    manual_checks: []
    risks:
      - other packages may read LEGACY_ANALYTICS_WRITE_KEY — verify no consumers outside scope
    notes: >
      Per Decision 3. Remove legacy env vars and update or rewrite
      docs/analytics-migration.md to describe only the new architecture.

  - id: slice-004
    type: convergence
    name: final residue sweep and ship gate
    status: proposed
    dependencies:
      - slice-002
      - slice-003
    touched_paths:
      - packages/web/
      - packages/shared/
      - docs/
    contracts:
      added: []
      changed: []
      removed: []
    denylist_patterns: []
    deletion_targets: []
    temp_artifacts: []
    docs_to_update: []
    dependency_changes: []
    residue_queries:
      - "trackLegacy"
      - "legacy-analytics"
      - "LEGACY_ANALYTICS"
      - "ENABLE_LEGACY_ANALYTICS_BRIDGE"
      - "TODO.*migration"
      - "HACK.*analytics"
      - "FIXME.*analytics"
    verification_commands:
      - "./guard.sh"
    replay_scenarios: []
    smoke_scenarios:
      - page view tracking works end-to-end
      - signup tracking works end-to-end
    manual_checks:
      - final diff review for accidental churn or stray files
    risks: []
    notes: >
      Convergence slice. Re-run full inventory against MAP.csv, execute
      SHIP_CHECKLIST.md, and write final handoff.
