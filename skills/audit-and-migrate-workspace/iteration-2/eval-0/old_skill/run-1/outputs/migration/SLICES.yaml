# Migration Slices
# Status lifecycle: proposed → in_progress → done

slices:
  - id: slice-001
    name: "Migrate getCurrentUser to token-only auth"
    status: proposed
    dependencies: []
    touched_paths:
      - src/routes/users.ts
      - src/auth/legacy-auth.ts
      - src/auth/token-auth.ts
      - tests/users-auth.test.ts
    contracts:
      added: []
      changed:
        - "src/routes/users.ts — remove legacy fallback, call verifyAccessToken only"
      removed:
        - "src/auth/legacy-auth.ts — entire file"
        - "readLegacySession function"
        - "LegacyUser type"
    denylist_patterns:
      - "readLegacySession"
      - "LegacyUser"
      - "legacy-auth"
      - "source.*legacy"
    deletion_targets:
      - src/auth/legacy-auth.ts
    replay_scenarios: []
    smoke_scenarios:
      - "Token auth succeeds: getCurrentUser({ authorization: 'Bearer token' }) returns user"
      - "Missing auth throws: getCurrentUser({}) throws 'unauthorized'"
      - "Cookie-only request throws: getCurrentUser({ cookie: 'legacy_session=abc' }) throws 'unauthorized'"
    risks:
      - "Any external caller relying on cookie auth will break — confirm no other consumers exist"
    notes: "Core migration slice. Tests are rewritten TDD-first to assert token-only behavior before modifying routes."

  - id: slice-002
    name: "Residue sweep — docs, scripts, config, env cleanup"
    status: proposed
    dependencies:
      - slice-001
    touched_paths:
      - docs/auth.md
      - scripts/seed-legacy-auth.sh
      - .env.example
    contracts:
      added: []
      changed:
        - "docs/auth.md — rewrite to describe token-based auth"
        - ".env.example — remove LEGACY_AUTH_SECRET and LEGACY_COOKIE_NAME"
      removed:
        - "scripts/seed-legacy-auth.sh — entire file"
    denylist_patterns:
      - "seed-legacy-auth"
      - "LEGACY_AUTH_SECRET"
      - "LEGACY_COOKIE_NAME"
      - "legacy_session"
    deletion_targets:
      - scripts/seed-legacy-auth.sh
    replay_scenarios: []
    smoke_scenarios:
      - "guard.sh --status shows all ratchets at 0"
    risks: []
    notes: "Anti-vestigial sweep. Ensures no stale docs, scripts, or env vars reference the removed legacy auth system."

  - id: slice-003
    name: "Final convergence — guard at zero, ship checklist green"
    status: proposed
    dependencies:
      - slice-001
      - slice-002
    touched_paths: []
    contracts:
      added: []
      changed: []
      removed: []
    denylist_patterns: []
    deletion_targets: []
    replay_scenarios: []
    smoke_scenarios:
      - "guard.sh passes with zero violations"
      - "npm run lint passes"
      - "npm run build passes"
      - "npm run test passes"
      - "grep -r 'legacy' src/ docs/ scripts/ .env.example returns zero matches"
    risks: []
    notes: "Verification-only slice. No code changes — confirms all ratchets are at zero, denylist patterns are clean, SHIP_CHECKLIST.md is fully green. If any check fails, fix in this slice before marking done."
