schema_version: "1"
method:
  id: autonomous-ratchet
  version: "2026-03-26"
  title: Autonomous Ratchet
  description: >
    Autonomous-only artifact-centric method for overnight quality improvement
    runs on an existing codebase. 17 steps across 6 phases: Triage ->
    Stabilize -> Envision -> Plan -> Execute -> Finalize. Use when asked to
    run this overnight, improve while I sleep, ratchet quality autonomously,
    or do an autonomous quality pass. Do not use for interactive steering,
    greenfield feature delivery, architecture decisions, cleanup-only sweeps,
    one-off fixes, or repos without explicit build/test/verify commands.

  phases:
    - id: triage
      title: Triage
      execution: serial
      steps:
        - id: mission-freeze
          title: Mission Freeze
          action: synthesis
          produces: mission-brief.md
          gate:
            type: outputs_present
            required: [mission-brief.md]
            checks:
              - "mission-brief.md contains the exact schema headings"
              - "allowed file scopes and verification command sets are explicit"
              - "quality bar, non-goals, constraints, and success definition are falsifiable"

        - id: triage-probes
          title: Triage Probes
          action: dispatch
          execution: parallel
          workers:
            - id: baseline
              title: Baseline Audit
              skills: []
              produces: baseline-audit.md
            - id: quality
              title: Quality Calibration
              skills: []
              produces: quality-calibration.md
            - id: backlog
              title: Improvement Backlog
              skills: []
              produces: improvement-backlog.md
          consumes: [mission-brief.md]
          produces:
            - baseline-audit.md
            - quality-calibration.md
            - improvement-backlog.md
          gate:
            type: outputs_present
            required:
              - baseline-audit.md
              - quality-calibration.md
              - improvement-backlog.md
            checks:
              - "all three triage artifacts contain their exact schema headings"
              - "baseline issues and calibration bullets carry stable ids"
              - "backlog rows are ranked and tagged BASELINE_RESTORE, IMPROVEMENT, or DEFER"

    - id: stabilize
      title: Stabilize
      execution: serial
      steps:
        - id: baseline-repair
          title: Baseline Repair
          action: dispatch
          adapter: manage-codex
          consumes: [mission-brief.md, baseline-audit.md, quality-calibration.md]
          produces: stabilization-report.md
          max_attempts: 2
          gate:
            type: outputs_present
            required: [stabilization-report.md]
            checks:
              - "stabilization-report.md contains the exact schema headings"
              - "every addressed item cites a BA-* id"
              - "verification, scope use, and reverts are explicit"

        - id: stability-audit
          title: Stability Audit
          action: dispatch
          consumes:
            - mission-brief.md
            - baseline-audit.md
            - stabilization-report.md
            - quality-calibration.md
          produces: stability-findings.md
          gate:
            type: outputs_present
            required: [stability-findings.md]
            checks:
              - "stability-findings.md contains the exact schema headings"
              - "review coverage walks every BA-*, MP-*, and RQ-*"
              - "verdict is stable, repair_again, or retriage with a ready-means section"
              - "reopen recommendation records a governing issue when not NONE"
          notes: >
            Diagnose-only assessment. This step does not consume injections or
            publish the authoritative Stabilize packet.

        - id: stabilize-ratchet
          title: Stabilize Ratchet
          action: dispatch
          consumes:
            - stability-findings.md
            - stabilization-report.md
            - mission-brief.md
            - quality-calibration.md
          produces: stability-gate.md
          gate:
            type: verdict-consistency
            required: [stability-gate.md]
            outcomes:
              stable: continue
              repair_again: reopen-baseline-repair
              retriage: reopen-triage-probes
            checks:
              - "stability-gate.md contains the exact schema headings"
              - "the injection ledger carries admitted, rejected, remaining, and per-injection results"
              - "verdict, ready means, and reopen decision match the evidence"

    - id: envision
      title: Envision
      execution: serial
      steps:
        - id: exploration-fanout
          title: Exploration Fanout
          action: dispatch
          execution: parallel
          workers:
            - id: inside-out
              title: Inside-Out Opportunities
              skills: []
              produces: inside-out-digest.md
            - id: outside-in
              title: Outside-In Patterns
              skills: []
              produces: outside-in-digest.md
          consumes:
            - mission-brief.md
            - quality-calibration.md
            - stability-gate.md
            - improvement-backlog.md
          produces:
            - inside-out-digest.md
            - outside-in-digest.md
          gate:
            type: outputs_present
            required: [inside-out-digest.md, outside-in-digest.md]
            checks:
              - "both digests contain the exact schema headings"
              - "both digests cite concrete evidence and calibration ids"

        - id: proposal-synthesis
          title: Proposal Synthesis
          action: synthesis
          consumes:
            - inside-out-digest.md
            - outside-in-digest.md
            - mission-brief.md
            - quality-calibration.md
          produces: improvement-proposal.md
          gate:
            type: outputs_present
            required: [improvement-proposal.md]
            checks:
              - "improvement-proposal.md contains the exact schema headings"
              - "each slice has a stable id and a calibration mapping"

        - id: design-review
          title: Design Review
          action: dispatch
          consumes:
            - improvement-proposal.md
            - mission-brief.md
            - quality-calibration.md
            - stability-gate.md
          produces: design-review.md
          gate:
            type: outputs_present
            required: [design-review.md]
            checks:
              - "design-review.md contains the exact schema headings"
              - "review coverage walks every RQ-* and every IP-* slice"
              - "verdict is ready, needs_more_exploration, or retriage with a ready-means section"
          notes: >
            Diagnose-only assessment. The worker does not modify code or
            authoritative artifacts.

        - id: envision-ratchet
          title: Envision Ratchet
          action: dispatch
          consumes:
            - improvement-proposal.md
            - design-review.md
            - mission-brief.md
            - quality-calibration.md
          produces: envisioned-packet.md
          gate:
            type: verdict-consistency
            required: [envisioned-packet.md]
            outcomes:
              ready: continue
              needs_more_exploration: reopen-exploration-fanout
              retriage: reopen-triage-probes
            checks:
              - "envisioned-packet.md contains the exact schema headings"
              - "the injection ledger carries admitted, rejected, remaining, and per-injection results"
              - "verdict, ready means, and reopen decision match the evidence"

    - id: plan
      title: Plan
      execution: serial
      steps:
        - id: plan-synthesis
          title: Plan Synthesis
          action: synthesis
          consumes:
            - envisioned-packet.md
            - mission-brief.md
            - quality-calibration.md
            - stability-gate.md
          produces: implementation-plan.md
          gate:
            type: outputs_present
            required: [implementation-plan.md]
            checks:
              - "implementation-plan.md contains the exact schema headings"
              - "candidate batches, verification, rollback, and janitor checkpoints are explicit"

        - id: plan-review
          title: Plan Review
          action: dispatch
          consumes:
            - implementation-plan.md
            - mission-brief.md
            - quality-calibration.md
            - envisioned-packet.md
          produces: plan-review.md
          gate:
            type: outputs_present
            required: [plan-review.md]
            checks:
              - "plan-review.md contains the exact schema headings"
              - "review coverage walks every RQ-*, PB-*, rollback trigger, and janitor checkpoint"
              - "verdict is ready, re_envision, or retriage with a ready-means section"
          notes: >
            Diagnose-only assessment. The worker does not modify code or
            authoritative artifacts.

        - id: plan-ratchet
          title: Plan Ratchet
          action: dispatch
          consumes:
            - implementation-plan.md
            - plan-review.md
            - envisioned-packet.md
            - quality-calibration.md
          produces: execution-charter.md
          gate:
            type: verdict-consistency
            required: [execution-charter.md]
            outcomes:
              ready: continue
              re_envision: reopen-envision-ratchet
              retriage: reopen-triage-probes
            checks:
              - "execution-charter.md contains the exact schema headings"
              - "ordered batch plan columns are exact and complete"
              - "the injection ledger carries admitted, rejected, remaining, and per-injection results"
              - "verdict, ready means, and reopen decision match the evidence"

    - id: execute
      title: Execute
      execution: serial
      steps:
        - id: execute-batches
          title: Execute Batches
          action: dispatch
          adapter: manage-codex
          consumes:
            - execution-charter.md
            - quality-calibration.md
            - stability-gate.md
            - mission-brief.md
          produces: execution-log.md
          max_attempts: 3
          gate:
            type: outputs_present
            required: [execution-log.md]
            checks:
              - "execution-log.md contains the exact schema headings"
              - "every charter batch appears exactly once in the batch ledger"
              - "per-batch details include attempts, converge verdict, janitor verdict, verification, and disposition"

        - id: execution-audit
          title: Execution Audit
          action: dispatch
          consumes:
            - execution-log.md
            - execution-charter.md
            - mission-brief.md
            - quality-calibration.md
          produces: execution-audit.md
          gate:
            type: outputs_present
            required: [execution-audit.md]
            checks:
              - "execution-audit.md contains the exact schema headings"
              - "review coverage walks every RQ-*, batch goal, MP-*, and remaining obligation"
              - "verdict is ready, partial, or reopen_plan with a ready-means section"
          notes: >
            Diagnose-only assessment. The worker does not modify code or
            authoritative artifacts.

        - id: execution-ratchet
          title: Execution Ratchet
          action: dispatch
          adapter: manage-codex
          consumes:
            - execution-log.md
            - execution-audit.md
            - execution-charter.md
            - quality-calibration.md
          produces: execution-report.md
          max_attempts: 2
          gate:
            type: verdict-consistency
            required: [execution-report.md]
            outcomes:
              ready: continue
              partial: continue
              reopen_plan: reopen-plan-ratchet
            checks:
              - "execution-report.md contains the exact schema headings"
              - "the injection ledger carries admitted, rejected, remaining, and per-injection results"
              - "remaining obligations are explicit when verdict is partial"
              - "verdict, ready means, and reopen decision match the evidence"

    - id: finalize
      title: Finalize
      execution: serial
      steps:
        - id: final-review
          title: Final Review
          action: dispatch
          consumes:
            - mission-brief.md
            - quality-calibration.md
            - execution-report.md
            - execution-charter.md
          produces: final-review.md
          gate:
            type: verdict-reopen
            required: [final-review.md]
            outcomes:
              ship_ready: continue
              partial: continue
              reopen_execute: reopen-execution-ratchet
            checks:
              - "final-review.md contains the exact schema headings"
              - "review coverage walks every RQ-*, MP-*, batch goal, and remaining obligation"
              - "verdict is ship_ready, partial, or reopen_execute with a ready-means section"
              - "reopen_execute records a governing issue and reopen target"
          notes: >
            Diagnose-only terminal assessment. Finalize does not consume
            injections.

        - id: closeout-packet
          title: Closeout Packet
          action: synthesis
          consumes:
            - final-review.md
            - execution-report.md
            - mission-brief.md
            - quality-calibration.md
          produces:
            - overnight-handoff.md
            - pr-brief.md
            - deferred-work.md
          gate:
            type: outputs_present
            required:
              - overnight-handoff.md
              - pr-brief.md
              - deferred-work.md
            checks:
              - "all three closeout artifacts contain the exact schema headings"
              - "overnight-handoff verdict matches final-review verdict"
              - "deferred-work captures every deferred item named upstream"
