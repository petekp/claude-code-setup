schema_version: "1"
method:
  id: janitor
  version: "2026-03-26"
  title: Janitor
  description: >
    Artifact-centric method for systematic codebase cleanup: dead code, stale
    docs, orphaned artifacts, vestigial comments, and redundant abstractions.
    5 phases (Survey, Triage, Prove, Clean, Verify) across 8 steps. Dual-mode:
    interactive (user checkpoints) or autonomous (evidence-gated, deferred
    review). Topology only — runtime behavior, adapter contracts, and proof
    heuristics live in SKILL.md.

  phases:
    - id: survey
      title: Survey
      execution: serial
      steps:
        - id: cleanup-scope
          title: Cleanup Scope
          action: interactive
          produces: cleanup-scope.md
          gate:
            type: outputs_present
            required: [cleanup-scope.md]
            checks:
              - "Target root, MODE, build command, and test command non-empty"
              - "At least one high-risk boundary named or explicit None"

        - id: category-survey-fanout
          title: Category Survey Fanout
          action: dispatch
          execution: parallel
          workers:
            - id: dead-code
              title: Dead Code Survey
              skills: []
              produces: dead-code-findings.md
            - id: stale-docs
              title: Stale Docs Survey
              skills: []
              produces: stale-docs-findings.md
            - id: orphaned-artifacts
              title: Orphaned Artifacts Survey
              skills: []
              produces: orphaned-artifacts-findings.md
            - id: vestigial-comments
              title: Vestigial Comments Survey
              skills: []
              produces: vestigial-comments-findings.md
            - id: redundant-abstractions
              title: Redundant Abstractions Survey
              skills: []
              produces: redundant-abstractions-findings.md
          consumes: [cleanup-scope.md]
          produces:
            - dead-code-findings.md
            - stale-docs-findings.md
            - orphaned-artifacts-findings.md
            - vestigial-comments-findings.md
            - redundant-abstractions-findings.md
          gate:
            type: outputs_present
            required:
              - dead-code-findings.md
              - stale-docs-findings.md
              - orphaned-artifacts-findings.md
              - vestigial-comments-findings.md
              - redundant-abstractions-findings.md
            checks:
              - "Each category finding includes candidate paths and uncertainty notes"

        - id: survey-consolidation
          title: Survey Consolidation
          action: synthesis
          consumes:
            - dead-code-findings.md
            - stale-docs-findings.md
            - orphaned-artifacts-findings.md
            - vestigial-comments-findings.md
            - redundant-abstractions-findings.md
            - cleanup-scope.md
          produces: survey-inventory.md
          gate:
            type: outputs_present
            required: [survey-inventory.md]
            checks:
              - "Cross-category duplicates resolved"
              - "Every candidate has category, path, rationale, and ambiguity flag"

    - id: triage
      title: Triage
      execution: serial
      steps:
        - id: triage-classification
          title: Triage Classification
          action: synthesis
          consumes: [survey-inventory.md, cleanup-scope.md]
          produces: triage-report.md
          gate:
            type: outputs_present
            required: [triage-report.md]
            checks:
              - "Every survey item has confidence, risk, action, and rationale"
              - "Interactive mode: approval recorded before gate passes"
              - "Autonomous mode: auto-approval rule and deferred counts recorded"

    - id: prove
      title: Prove
      execution: serial
      steps:
        - id: evidence-adjudication
          title: Evidence Adjudication
          action: dispatch
          consumes: [triage-report.md, cleanup-scope.md]
          produces: evidence-log.md
          gate:
            type: evidence-reopen
            outcomes:
              evidence_sufficient: continue
              queue_adjustment_required: update-triage-report
              risk_boundary_invalidated: interactive-reopen
          notes: >
            Worker proves or clears items marked PROVE. Can reopen triage if
            evidence changes risk classification.

    - id: clean
      title: Clean
      execution: serial
      steps:
        - id: cleanup-batch-execution
          title: Cleanup Batch Execution
          action: dispatch
          adapter: manage-codex
          consumes: [triage-report.md, evidence-log.md, cleanup-scope.md]
          produces: cleanup-batches.md
          gate:
            type: outputs_present
            required: [cleanup-batches.md]
            checks:
              - "Every batch has ordered items, verification results, and terminal disposition"
              - "Failed batches show explicit revert evidence"
          notes: >
            One topology step containing an ordered per-batch execution loop.
            Delegates to manage-codex for implement -> review -> converge per
            batch. Retry contract (up to 3 attempts per batch) lives in
            SKILL.md. Interactive mode pauses before each batch. Autonomous
            mode auto-dispatches eligible batches with build/test gates.

    - id: verify
      title: Verify
      execution: serial
      steps:
        - id: verification-audit
          title: Verification Audit
          action: dispatch
          consumes: [cleanup-batches.md, triage-report.md, evidence-log.md, cleanup-scope.md]
          produces: verification-audit.md
          gate:
            type: outputs_present
            required: [verification-audit.md]
            checks:
              - "Build/test results, warning delta (or NOT MEASURABLE), diff sanity, and manifest cross-check present"
              - "Candidate verdict present"
          notes: >
            Diagnose-only assessment. Worker does NOT modify source code.

        - id: verification-synthesis
          title: Verification Synthesis
          action: synthesis
          consumes: [cleanup-batches.md, verification-audit.md, triage-report.md, evidence-log.md]
          produces: [verification-report.md, deferred-review.md]
          gate:
            type: verdict-consistency
            outcomes:
              clean: pass
              partial: pass
              reopen: interactive-reopen
          notes: >
            Terminal report and deferred-review publication. deferred-review.md
            is produced only in autonomous mode. clean requires all checks to
            agree. partial requires deferred items documented. reopen requires
            a named failing boundary and reopen target.
