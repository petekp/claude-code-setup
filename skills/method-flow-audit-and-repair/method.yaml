schema_version: "1"
method:
  id: flow-audit-and-repair
  version: "2026-03-22"
  title: Flow Audit and Repair
  description: >
    Forensic debugging method for broken, flaky, or operationally unsafe end-to-end flows.
    Chains observed failure → audit → causal model → regression contract → ordered repair
    → live re-audit through 5 phases. Topology only — this file does not encode runtime
    behavior or adapter contracts.

  phases:
    - id: failure-framing
      title: Failure Framing
      execution: serial
      steps:
        - id: failure-brief
          title: Failure Brief
          action: interactive
          produces: failure-brief.md
          gate:
            type: outputs_present
            required: [failure-brief.md]
            checks:
              - "Expected Behavior non-empty"
              - "Actual Behavior non-empty"
              - "Reproduction Path non-empty"
              - "Done Signal non-empty"

    - id: forensics
      title: Forensics
      execution: serial
      steps:
        - id: live-flow-audit
          title: Live Flow Audit
          action: dispatch
          skills: [exhaustive-systems-analysis] # plus domain-skills resolved at runtime
          consumes: [failure-brief.md]
          produces: audit-trace.md
          gate:
            type: outputs_present
            required: [audit-trace.md]
            checks:
              - "reproduced failure or explicit non-reproduction result"
              - "enough evidence to explain what was observed"
        - id: layered-causal-map
          title: Layered Causal Map
          action: synthesis
          consumes: [failure-brief.md, audit-trace.md]
          produces: causal-map.md
          gate:
            type: outputs_present
            required: [causal-map.md]
            checks:
              - "every major symptom mapped to at least one layer"
              - "facts distinguished from hypotheses"

    - id: repair-design
      title: Repair Design
      execution: serial
      steps:
        - id: repair-focus-checkpoint
          title: Repair Focus Checkpoint
          action: interactive
          consumes: [causal-map.md]
          produces: repair-steer.md
          gate:
            type: outputs_present
            required: [repair-steer.md]
            checks:
              - "Priority Failure explicit"
              - "Must-Keep Behaviors explicit"
              - "scope cuts named when present"
        - id: regression-contract
          title: Regression Contract
          action: dispatch
          skills: [tdd] # plus domain-skills resolved at runtime
          consumes: [failure-brief.md, causal-map.md, repair-steer.md]
          produces: regression-contract.md
          gate:
            type: outputs_present
            required: [regression-contract.md]
            checks:
              - "primary failure has failing test or probe"
              - "or explicit instrumentation-based proof contract recorded"
        - id: repair-packet
          title: Repair Packet
          action: synthesis
          consumes: [causal-map.md, repair-steer.md, regression-contract.md]
          produces: repair-packet.md
          gate:
            type: outputs_present
            required: [repair-packet.md]
            checks:
              - "every slice has named layer owner"
              - "every slice has at least one regression obligation"
              - "slice order reflects dependency direction"

    - id: layered-repair
      title: Layered Repair
      execution: serial
      steps:
        - id: layered-repair
          title: Layered Repair
          action: dispatch
          adapter: manage-codex
          skills: [tdd] # plus one domain-skill resolved at runtime
          consumes: [repair-packet.md, regression-contract.md]
          produces: repair-handoff.md
          max_attempts: 3
          notes: >
            Delegates to manage-codex. Orchestrator creates CHARTER.md from
            repair-packet.md + regression-contract.md and synthesizes repair-handoff.md
            from convergence output.
          gate:
            type: outputs_present
            required: [repair-handoff.md]
            checks:
              - "primary regression harness passes or explicit blocker recorded"
              - "every repair slice completed or explicitly deferred"
              - "Residual Risks named"

    - id: reaudit
      title: Reaudit
      execution: serial
      steps:
        - id: flow-reaudit
          title: Flow Reaudit
          action: dispatch
          skills: [exhaustive-systems-analysis] # plus domain-skills resolved at runtime
          consumes: [failure-brief.md, audit-trace.md, repair-handoff.md]
          produces: flow-verdict.md
          gate:
            type: verdict-consistency
            required: [flow-verdict.md]
            outcomes:
              closed: "live flow and regression pack agree"
              partial: "exact failing boundary named"
              reopen: "exact failing boundary named"
          notes: >
            If verdict is PARTIAL or REOPEN, user chooses whether to narrow scope,
            reopen from the causal map, or accept an explicit partial operational patch.
