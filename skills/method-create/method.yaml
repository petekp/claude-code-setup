schema_version: "1"
method:
  id: method-create
  version: "2026-03-26"
  title: Method Create
  description: >
    Codex-powered compiler for turning a natural-language workflow description
    into a method skill that matches the live corpus. Chains workflow brief ->
    method analysis -> draft files -> validation report -> refined install across
    5 phases. Topology only - this file does not encode runtime behavior or
    authoring references.

  phases:
    - id: intake
      title: Intake
      execution: serial
      steps:
        - id: workflow-intake
          title: Workflow Intake
          action: interactive
          produces: workflow-brief.md
          gate:
            type: outputs_present
            required: [workflow-brief.md]
            checks:
              - "Method goal explicit"
              - "Trigger surface and negative scope explicit"
              - "Method family explicit or intentionally unresolved"
              - "Output target explicit"

    - id: analysis
      title: Analysis
      execution: serial
      steps:
        - id: pattern-mapping
          title: Pattern Mapping
          action: dispatch
          consumes: [workflow-brief.md]
          produces: method-analysis.md
          gate:
            type: outputs_present
            required: [method-analysis.md]
            checks:
              - "Phase topology explicit"
              - "Action types, artifact chain, and external inputs explicit"
              - "Gate, reopen, and resume plan explicit"
          notes: >
            Codex worker reads the workflow brief and maps it to the live method
            patterns. Determines artifact-centric vs validator family.

    - id: authoring
      title: Authoring
      execution: serial
      steps:
        - id: compile-method-files
          title: Compile Method Files
          action: dispatch
          consumes: [workflow-brief.md, method-analysis.md]
          produces: [draft-method.yaml, draft-SKILL.md, cross-validation.md]
          gate:
            type: outputs_present
            required: [draft-method.yaml, draft-SKILL.md, cross-validation.md]
            checks:
              - "Draft files agree on topology, triggers, and gate semantics"
              - "Starter templates, decision table, quality gate, and anti-pattern catalog present"
              - "Compiler-only scope, resume rules, and circuit breaker explicit"
          notes: >
            Codex worker generates draft method.yaml and SKILL.md to staging,
            then cross-validates them field by field.

    - id: validation
      title: Validation
      execution: serial
      steps:
        - id: quality-gate
          title: Quality Gate
          action: dispatch
          consumes: [draft-method.yaml, draft-SKILL.md, cross-validation.md]
          produces: validation-report.md
          gate:
            type: outputs_present
            required: [validation-report.md]
            checks:
              - "All six quality categories walked explicitly"
              - "Anti-patterns named by ID"
              - "Verdict is READY or REVISE with named issues"
          notes: >
            Codex review worker walks the six quality categories against the
            draft files. Assessment only - does not modify the drafts.

    - id: refinement
      title: Refinement
      execution: serial
      steps:
        - id: claude-code-refinement
          title: Claude Code Refinement
          action: synthesis
          consumes: [draft-method.yaml, draft-SKILL.md, cross-validation.md, validation-report.md]
          produces: [method.yaml, SKILL.md]
          gate:
            type: verdict-reopen
            outcomes:
              ready: continue
              revise: interactive-reopen
          notes: >
            Orchestrator reads all upstream artifacts plus validation findings,
            refines for Claude Code optimization, and installs to TARGET_METHOD_ROOT.
            This is the only step that writes to the final skill directory.
