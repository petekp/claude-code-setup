schema_version: "1"
method:
  id: method-dry-run
  version: "2026-03-22"
  title: Method Dry Run
  description: >
    Interactive validation of a method skill by symbolically executing one concrete
    feature through every step. Combines a fixed 10-dimension structural checklist
    with step-by-step simulation of prompt assembly, worker output, and artifact
    promotion. Topology only — this file describes the dry-run workflow, not the
    target method being validated.

  phases:
    - id: validation
      title: Validation
      execution: serial
      steps:
        - id: collect-inputs
          title: Collect Inputs and Source Files
          action: interactive
          produces: validation-scope.md
          gate:
            type: outputs_present
            required: [validation-scope.md]
            checks:
              - "Target Method section present"
              - "Concrete Test Feature section present"
              - "Repo Root section present"
              - "Source Files section present"

        - id: resolve-constants
          title: Resolve Constants
          action: synthesis
          consumes: [validation-scope.md]
          produces: resolved-constants.md
          gate:
            type: outputs_present
            required: [resolved-constants.md]
            checks:
              - "at least one symbol-to-value row"
              - "Path Expansions section present"
              - "Undefined Symbols section present"
              - "Assumptions section present"

        - id: inventory-steps
          title: Inventory Steps and Contracts
          action: synthesis
          consumes: [validation-scope.md, resolved-constants.md]
          produces: step-inventory.md
          gate:
            type: outputs_present
            required: [step-inventory.md]
            checks:
              - "Steps table covers every step from SKILL.md"
              - "Worker Records section present"
              - "Topology Mismatches section present"

        - id: simulate-and-trace
          title: Simulate and Trace
          action: synthesis
          consumes: [validation-scope.md, resolved-constants.md, step-inventory.md]
          produces: dry-run-trace.md
          notes: >
            For each step: simulate setup, header, prompt assembly, worker output,
            verify/promote, gate, and forward chain (steps 4a-4h in SKILL.md).
            Then fill the 10-row checklist table. After all steps, run the targeted
            closure pass and issue the binary verdict.
          gate:
            type: outputs_present
            required: [dry-run-trace.md]
            checks:
              - "Resolved Constants section present"
              - "every traced step includes 10-row checklist table"
              - "every dispatch step includes simulated prompt assembly"
              - "Artifact Chain section present"
              - "Mechanical Failures Found section present"
              - "VERDICT is MECHANICALLY SOUND or HAS FAILURES (N)"
